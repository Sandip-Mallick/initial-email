<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Legal Email Response Generator</title>

    <!-- Runtime Configuration for Environment Variables -->
    <script type="text/javascript" src="/runtime-config.js"></script>

    <!-- Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>

    <!-- For more information on Fluent UI, visit https://developer.microsoft.com/fluentui -->
    <link rel="stylesheet" href="https://static2.sharepointonline.com/files/fabric/office-ui-fabric-core/11.0.0/css/fabric.min.css"/>

    <!-- Template styles -->
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            font-family: "Segoe UI", "Segoe UI Web (West European)", "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, "Helvetica Neue", sans-serif;
        }
        
        #app-title {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .ms-Button {
            display: inline-block;
            text-decoration: none;
            text-align: center;
            border: 1px solid #0078d4;
            background-color: #0078d4;
            color: white;
            font-weight: 600;
            padding: 0 16px;
            min-width: 80px;
            height: 32px;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.1s ease-in-out;
            margin: 8px 0;
        }
        
        .ms-Button:hover {
            background-color: #106ebe;
        }
        
        .ms-Button:active {
            background-color: #005a9e;
        }
        
        #status {
            margin-top: 20px;
            min-height: 32px;
            text-align: center;
        }
        
        #response-container {
            margin-top: 20px;
            width: 100%;
            max-width: 600px;
            min-height: 100px;
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 4px;
            display: none;
            white-space: pre-wrap;
            font-family: "Segoe UI", sans-serif;
            line-height: 1.5;
        }
        
        #response-container strong {
            font-weight: bold;
            display: block;
            margin-top: 10px;
            margin-bottom: 10px;
        }
        
        #copy-button {
            margin-top: 10px;
            display: none;
        }
    </style>
</head>

<body class="ms-font-m ms-Fabric">
    <div id="app">
        <h2 id="app-title">Legal Email Response Generator</h2>
        <button id="save-button" class="ms-Button">
            <span class="ms-Button-label">Save Email as JSON</span>
        </button>
        <button id="openai-button" class="ms-Button">
            <span class="ms-Button-label">Generate Legal Response</span>
        </button>
        <div id="status"></div>
        <div id="response-container"></div>
        <button id="copy-button" class="ms-Button">
            <span class="ms-Button-label">Copy Response</span>
        </button>
    </div>
    
    <script>
        // Add a copy to clipboard function
        document.getElementById('copy-button').addEventListener('click', function() {
            const responseText = document.getElementById('response-container').innerText;
            navigator.clipboard.writeText(responseText)
                .then(() => {
                    document.getElementById('status').innerText = "Response copied to clipboard!";
                })
                .catch(err => {
                    document.getElementById('status').innerText = "Failed to copy: " + err;
                });
        });
    </script>
</body>
</html>
